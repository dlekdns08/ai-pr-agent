ai-code-review:
  stage: test
  image: python:3.12-slim
  rules:
    # MR이 열리거나 업데이트될 때만 실행
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  before_script:
    - pip install uv
    - uv sync --frozen
  script:
    - uv run python main.py
  variables:
    # GitLab CI/CD Settings > Variables에서 설정 필요:
    #   GITLAB_TOKEN     - GitLab API 토큰 (api scope)
    #   ANTHROPIC_API_KEY - Claude API 키
    GIT_STRATEGY: none
